services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-votingfs}
      POSTGRES_USER: ${POSTGRES_USER:-votingfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-votingfs_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-votingfs} -d ${POSTGRES_DB:-votingfs}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-votingfs}:${POSTGRES_PASSWORD:-votingfs_password}@postgres:5432/${POSTGRES_DB:-votingfs}
      SECRET_KEY: ${SECRET_KEY:-change_me_super_long_random_secret}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-polls-images}
      MINIO_SECURE: "False"
      EXTERNAL_QUOTE_API_BASE_URL: ${EXTERNAL_QUOTE_API_BASE_URL:-https://dummyjson.com}
      EXTERNAL_QUOTE_API_TIMEOUT_SECONDS: ${EXTERNAL_QUOTE_API_TIMEOUT_SECONDS:-5}
      EXTERNAL_QUOTE_API_RETRY_COUNT: ${EXTERNAL_QUOTE_API_RETRY_COUNT:-2}
      EXTERNAL_QUOTE_MIN_INTERVAL_SECONDS: ${EXTERNAL_QUOTE_MIN_INTERVAL_SECONDS:-1}
      EXTERNAL_QUOTE_CACHE_TTL_SECONDS: ${EXTERNAL_QUOTE_CACHE_TTL_SECONDS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
